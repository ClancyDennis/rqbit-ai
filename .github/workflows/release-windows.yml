name: Release binaries for Windows

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install Binstall
        uses: cargo-bins/cargo-binstall@57726869e28f4038a847ec56e5fdd9142fded110 # pinned from main

      - name: install Tauri
        run: cargo binstall tauri-cli@2.8.4 --no-confirm

      - name: npm ci
        run: npm ci

      - name: cargo tauri build
        working-directory: desktop
        run: cargo tauri build --ci

      - uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          generate_release_notes: true
          files: |
            target/release/bundle/msi/rqbit-desktop_*_x64_en-US.msi

      - name: Build release
        run: cargo build --profile release-github

      - uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          generate_release_notes: true
          files: |
            target/release-github/rqbit.exe
